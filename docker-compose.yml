version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart-leads
    networks:
      - smart-leads-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-leads-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:80
      BCRYPT_SALT_ROUNDS: 12
    depends_on:
      - mongo
    networks:
      - smart-leads-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smart-leads-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - smart-leads-net

volumes:
  mongo_data:
    driver: local

networks:
  smart-leads-net:
    driver: bridge
